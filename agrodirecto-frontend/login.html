<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Amaranth:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <!-- Google Icons -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <title>Acceso - AgroDirecto</title>
</head>
<body>

    <nav id="nav-principal">
        <a href="index.html"><strong>AGRODIRECTO</strong></a>
        <div class="links-nav">
            <a href="index.html">← Volver al Inicio</a>
        </div>
    </nav>

    <main class="pantalla-login">
        <div class="caja-formulario con-foto-superior">

            <img
                src="https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=700&q=80"
                alt="Surcos de cultivo en el campo"
                class="foto-formulario">

            <h2>Iniciar Sesion</h2>
            <p>Ingrese sus credenciales para gestionar sus cultivos o reservas.</p>

            <form id="form-login">

                <div class="campo-grupo">
                    <label for="campo-correo">Correo Electronico</label>
                    <input
                        type="email"
                        id="campo-correo"
                        class="campo-input"
                        placeholder="ejemplo@correo.com"
                        required>
                </div>

                <div class="campo-grupo">
                    <label for="campo-clave">Contraseña</label>

                    <div class="contenedor-password">
                        <input
                            type="password"
                            id="campo-clave"
                            class="campo-input"
                            placeholder="Minimo 6 caracteres"
                            required>

                        <button
                            type="button"
                            id="btn-ver-clave"
                            onclick="toggleClave()"
                            title="Mostrar/ocultar contrasena">

                            <span class="material-symbols-outlined">
                                visibility
                            </span>
                        </button>
                    </div>
                </div>

                <div class="accion-formulario">
                    <button type="submit" id="btn-ingresar" class="btn-verde">
                        Ingresar
                    </button>
                </div>
            </form>

            <div class="pie-form">
                No tiene cuenta?
                <a href="registro.html">Registrese aqui</a>
            </div>
        </div>
    </main>

    <footer id="pie-pagina">
        <p><strong>AgroDirecto</strong> — Del campo a su negocio, sin rodeos. 2026</p>
    </footer>

    <script src="api.js"></script>

    <script>
        function toggleClave() {
            const input = document.getElementById('campo-clave');
            const btn = document.getElementById('btn-ver-clave');

            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `
                    <span class="material-symbols-outlined">
                        visibility_off
                    </span>
                `;
            } else {
                input.type = 'password';
                btn.innerHTML = `
                    <span class="material-symbols-outlined">
                        visibility
                    </span>
                `;
            }
        }

        // 1. Muestra un mensaje de error debajo del titulo del formulario
        function mostrarError(mensaje) {
            let alerta = document.getElementById('alerta-login');
            if (!alerta) {
                alerta = document.createElement('div');
                alerta.id = 'alerta-login';
                document.getElementById('form-login').prepend(alerta);
            }
            alerta.className = 'alerta alerta-error visible';
            alerta.textContent = mensaje;
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();

            const correo = document.getElementById('campo-correo').value.trim();
            const clave = document.getElementById('campo-clave').value;
            const boton = document.getElementById('btn-ingresar');

            // 2. Desactivamos el boton mientras esperamos la respuesta de la API
            boton.disabled = true;
            boton.textContent = 'Ingresando...';

            try {
                // 3. Le pedimos a la API que inicie sesion (esto guarda el token)
                const usuario = await iniciarSesion(correo, clave);

                // 4. Segun el rol, mandamos al panel correspondiente
                if (usuario.rol === 'Administrador') {
                    location.href = 'panel_admin.html';
                } else if (usuario.rol === 'Productor') {
                    location.href = 'panel_productor.html';
                } else {
                    location.href = 'panel_comprador.html';
                }
            } catch (error) {
                mostrarError(error.message || 'Correo o contraseña incorrectos, o cuenta inactiva.');
                boton.disabled = false;
                boton.textContent = 'Ingresar';
            }
        });
    </script>

    <!--
    Admin: admin@agrodirecto.com / admin123
    Productor: finca.paraiso@campo.com / prod123
    Comprador: compras@laplaza.com / comp123
    -->

</body>
</html>
